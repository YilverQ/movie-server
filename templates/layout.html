<!DOCTYPE html>
<html lang="es">
<head>
	<!-- Meta -->
	<meta charset="utf-8">
	<meta name="author" content="Yilver Quevedo">
	<meta name="description" content="Servidor de Peliculas Para El Uso Domestico. Aquí podrás descargar y ver películas oneline sin costo alguno siempre y cuando sea para el uso personal.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


	<!-- Title -->
	<title>{{ datos["title"] }} - Movie Server</title>
	
	<!-- Estilos -->
    <link rel="shortcut icon" type="image/x-icon"  href="{{ url_for('static', filename='img/favicon.png') }}">
	<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/normalize.css') }}">
	<link rel="stylesheet" type="text/css" href=" {{ url_for('static', filename='css/estilos.css') }} ">
	{% block links %}
	{% endblock %}
	
</head>
<body>
	<input class="boton_menu none" type="checkbox" id="close">
	<label class="label_inicio none yes_visible" for="close">
		<span id="open" class="boton_open none yes_visible">=</span>
		<a href="/">
			<p class="page-name">Movie Server</p>
		</a>
	</label>
	<aside class="no_visible">
		<label class="boton_menu" for="close">
			<span id="close" class="boton_close none yes_visible">X</span>
		</label>
		<div class="title">
			<a href="/"><h2>Movie Server</h2></a>
		</div>
		<section class="tags_main">
			{% for item in datos["tags"] %}
			<div class="tag_main">
				<a href="/tag/{{ item }}">
					<div class="image_tag">
						<img src="/static/img/{{ item }}.png" alt="Logo de {{ item }} desde Movie Server">
					</div>
					<p>{{ item }}</p>
				</a>
			</div>
			{% endfor %}
		</section>
	</aside>
	<article class="main">
		<div class="main_container">
			{% block content %}
			{% endblock %}
		</div>
	</article>
	{% block javascript %}
	{% endblock %}
</body>
</html>
